# Production-demo Compose stack.
#
# Use with:
#   docker-compose -f docker-compose.prod.yml --env-file docs/deployment/.env.production.example config
#
# The env file is a placeholder template. Replace secret placeholders through
# deployment environment injection before running a real production-demo stack.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    image: enterprise-os-backend:prod-demo
    environment:
      APP_NAME: ${APP_NAME:-Enterprise Multi-Agent OS}
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_REDACTION_ENABLED: ${LOG_REDACTION_ENABLED:-true}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_ROUTE_ENABLED: ${METRICS_ROUTE_ENABLED:-true}
      METRICS_MAX_PATH_LABEL_LENGTH: ${METRICS_MAX_PATH_LABEL_LENGTH:-120}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://enterprise_os:change-me-in-production@postgres:5432/enterprise_os}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-change-me-in-production}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-change-me-in-production}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-enterprise-multi-agent-os}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      LLM_PROVIDER: ${LLM_PROVIDER:-fake}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_RUNTIME_ENABLED: ${LLM_RUNTIME_ENABLED:-false}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-2}
      LLM_FALLBACK_ENABLED: ${LLM_FALLBACK_ENABLED:-false}
      LLM_FALLBACK_PROVIDER: ${LLM_FALLBACK_PROVIDER:-fake}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama.example.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fake}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-fake-hash-embedding}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-64}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      RAG_ENABLED: ${RAG_ENABLED:-false}
      RAG_TOP_K: ${RAG_TOP_K:-3}
      RAG_MINIMUM_SCORE: ${RAG_MINIMUM_SCORE:-0.0}
      RAG_MAX_CONTEXT_CHARS: ${RAG_MAX_CONTEXT_CHARS:-3000}
      RAG_EVENT_PAYLOAD_MAX_CHARS: ${RAG_EVENT_PAYLOAD_MAX_CHARS:-2000}
    ports:
      - "${BACKEND_PUBLIC_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - enterprise-os-internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
        NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-ws://localhost:8000/api/v1}
    image: enterprise-os-frontend:prod-demo
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-ws://localhost:8000/api/v1}
      PORT: "3000"
    ports:
      - "${FRONTEND_PUBLIC_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - enterprise-os-internal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-enterprise_os}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_os}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - enterprise-os-internal

  redis:
    image: redis:7-alpine
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - enterprise-os-internal

  qdrant:
    image: qdrant/qdrant:v1.12.5
    volumes:
      - qdrant_prod_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "printf 'GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' > /dev/tcp/localhost/6333"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - enterprise-os-internal

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-change-me-in-production}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-change-me-in-production}
    volumes:
      - minio_prod_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - enterprise-os-internal

networks:
  enterprise-os-internal:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:
  qdrant_prod_data:
  minio_prod_data:
