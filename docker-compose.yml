services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: enterprise-os-backend
    environment:
      APP_NAME: "Enterprise Multi-Agent OS"
      APP_ENV: development
      DEBUG: "true"
      API_V1_PREFIX: /api/v1
      BACKEND_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/enterprise_os
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: enterprise-multi-agent-os
      LLM_PROVIDER: ollama
      GROQ_API_KEY: ""
      OPENROUTER_API_KEY: ""
      GEMINI_API_KEY: ""
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/enterprise_os
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    command: ["pytest"]

  postgres:
    image: postgres:16-alpine
    container_name: enterprise-os-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enterprise_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d enterprise_os"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: enterprise-os-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: enterprise-os-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: enterprise-os-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
